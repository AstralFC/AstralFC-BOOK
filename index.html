<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRAL FC • VRFS Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap');
        
        :root {
            --primary: #00f5ff;
            --accent: #ff00aa;
            --gold: #ffd700;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: #0a001f;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }
        
        .stars, .nebula { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; }
        .stars { 
            background: radial-gradient(circle at 25% 30%, rgba(255,255,255,0.8) 1px, transparent 2px),
                        radial-gradient(circle at 75% 60%, rgba(255,255,255,0.7) 1px, transparent 2px),
                        linear-gradient(180deg, #0a001f 0%, #1a0033 100%);
            background-size: 200% 200%; 
            animation: starTwinkle 25s linear infinite; 
        }
        .nebula { 
            background: radial-gradient(circle at 30% 40%, rgba(0, 245, 255, 0.15) 0%, transparent 60%),
                        radial-gradient(circle at 70% 70%, rgba(255, 0, 170, 0.12) 0%, transparent 70%); 
            animation: nebulaDrift 120s ease infinite; 
        }
        
        @keyframes starTwinkle { 0% {background-position:0% 0%} 100%{background-position:200% 200%} }
        @keyframes nebulaDrift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
        
        header { 
            background: rgba(10,0,31,0.95); 
            backdrop-filter: blur(10px); 
            padding: 1.2rem 5%; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 3px solid var(--primary); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 2.2rem; 
            font-weight: 700; 
            background: linear-gradient(90deg, var(--primary), var(--accent)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        
        .tab-container { 
            padding: 2rem 8% 1rem; 
            display: flex; 
            gap: 15px; 
            border-bottom: 2px solid rgba(0,245,255,0.2); 
        }
        .tab-btn { 
            padding: 12px 28px; 
            background: rgba(20,5,50,0.6); 
            border: 2px solid var(--primary); 
            color: white; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 1.1rem; 
            cursor: pointer; 
            border-radius: 50px; 
            transition: all 0.3s; 
        }
        .tab-btn.active { 
            background: var(--primary); 
            color: #0a001f; 
            border-color: var(--gold); 
            box-shadow: 0 0 20px var(--gold); 
        }
        
        .search-bar {
            width: 90%;
            max-width: 700px;
            margin: 1.5rem auto 2rem;
            padding: 16px 25px;
            font-size: 1.1rem;
            border: 3px solid var(--primary);
            border-radius: 50px;
            background: rgba(10,0,31,0.8);
            color: white;
            display: block;
        }
        
        .team-section { padding: 1rem 8%; display: none; }
        .team-section.active { display: block; }
        
        .team-header { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 1.5rem; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 2.3rem; 
        }
        
        .players-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 2.5rem; 
        }
        
        .player-card {
            background: rgba(20,5,50,0.75);
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--primary);
            cursor: pointer;
            transition: all 0.4s;
        }
        .player-card:hover { 
            transform: translateY(-15px) scale(1.04); 
            box-shadow: 0 25px 50px rgba(0,245,255,0.4); 
        }
        
        .player-header { 
            height: 240px; 
            background: linear-gradient(135deg, #1a0033, #003344); 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column; 
        }
        .ovr-circle {
            position: absolute; top: 20px; left: 20px;
            background: var(--accent); color: white;
            font-family: 'Orbitron', sans-serif; font-size: 2.1rem; font-weight: bold;
            width: 78px; height: 78px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 5px solid white; box-shadow: 0 0 25px var(--accent);
        }
        .player-avatar { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            border: 5px solid var(--primary); 
            margin-top: 30px; 
            object-fit: cover;
        }
        
        .card-info { padding: 20px; text-align: center; }
        .player-name { font-size: 1.65rem; font-weight: bold; margin: 10px 0 5px; }
        .player-pos { color: var(--accent); font-size: 1.15rem; }
        
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(10,0,31,0.97); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center; 
        }
        .modal-content { 
            background: rgba(20,5,50,0.98); 
            max-width: 620px; 
            width: 92%; 
            border-radius: 22px; 
            border: 3px solid var(--primary); 
            padding: 2rem; 
            position: relative; 
        }
        .close { 
            position: absolute; 
            top: 15px; 
            right: 25px; 
            font-size: 2.5rem; 
            cursor: pointer; 
            color: var(--accent); 
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="nebula"></div>

    <header><div class="logo">ASTRAL FC</div></header>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTeam(1)">🥇 TEAM 1</button>
        <button class="tab-btn" onclick="switchTeam(2)">TEAM 2</button>
    </div>

    <input type="text" id="searchInput" class="search-bar" placeholder="Search players...">

    <!-- Team 1 -->
    <div id="team1Section" class="team-section active">
        <div class="team-header" style="color:var(--gold);">🥇 TEAM 1 - CHAMPIONS</div>
        <div id="team1Grid" class="players-grid"></div>
    </div>

    <!-- Team 2 -->
    <div id="team2Section" class="team-section">
        <div class="team-header">TEAM 2</div>
        <div id="team2Grid" class="players-grid"></div>
    </div>

    <!-- Modal -->
    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">×</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let team1 = [
            {
                name: "Vxfs",
                vrfsId: "TBD",
                position: "CM",
                ovr: 113,
                shooting: 164,
                passing: 112,
                description: "Stay humble in life and just here to play.",
                avatar: "https://cdn.phototourl.com/free/2026-06-27-05cfbafc-f6d7-47ff-b71a-da526ba54b2c.jpg"
            },
            {
                name: "jeffy",
                vrfsId: "TBD",
                position: "CB",
                ovr: 142,
                shooting: 213,
                passing: 134,
                description: "There always bro's before hoe's",
                avatar: "https://cdn.discordapp.com/attachments/1519786722886680819/1520328057376739439/IMG_0865.png"
            },
            {
                name: "MishXash",
                vrfsId: "TBD",
                position: "RB",
                ovr: 142,
                shooting: 213,
                passing: 134,
                description: "There always bro's before hoe's",
                avatar: "https://cdn.discordapp.com/attachments/1519786722886680819/1520328057376739439/IMG_0865.png"
            },
            {
                name: "Vnilla",
                vrfsId: "TBD",
                position: "RW",
                ovr: 1000,
                shooting: 1487,
                passing: 1026,
                description: "What i have is not a dream, because i will make it a reality.",
                avatar: "https://cdn.discordapp.com/attachments/1520252087521251473/1520520632557637913/IMG_1692.jpg"
            }
        ];

        let team2 = [
            {
                name: "NebulaMid",
                vrfsId: "TBD",
                position: "CM",
                ovr: 89,
                shooting: 78,
                passing: 93,
                description: "Creative midfielder.",
                avatar: "https://picsum.photos/id/1005/300/300"
            }
        ];

        function renderTeam(gridId, list) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = '';
            list.forEach(player => {
                const card = document.createElement('div');
                card.className = 'player-card';
                card.innerHTML = `
                    <div class="player-header">
                        <div class="ovr-circle">${player.ovr}</div>
                        <img src="${player.avatar}" class="player-avatar" onerror="this.src='https://picsum.photos/id/64/300/300'">
                    </div>
                    <div class="card-info">
                        <div class="player-name">${player.name}</div>
                        <div class="player-pos">${player.position} • ${player.vrfsId}</div>
                    </div>
                `;
                card.onclick = () => showModal(player);
                grid.appendChild(card);
            });
        }

        function showModal(p) {
            document.getElementById('modalBody').innerHTML = `
                <h2 style="text-align:center;">${p.name}</h2>
                <p style="text-align:center;color:var(--accent);font-size:1.4rem;">${p.position} — OVR ${p.ovr}</p>
                <p style="margin:1.5rem 0;line-height:1.6;">${p.description}</p>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                    <div style="background:rgba(0,245,255,0.1);padding:20px;border-radius:12px;text-align:center;">
                        <strong>Shooting</strong><br><span style="font-size:2.6rem;color:var(--primary);">${p.shooting}</span>
                    </div>
                    <div style="background:rgba(0,245,255,0.1);padding:20px;border-radius:12px;text-align:center;">
                        <strong>Passing</strong><br><span style="font-size:2.6rem;color:var(--primary);">${p.passing}</span>
                    </div>
                </div>
            `;
            document.getElementById('playerModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('playerModal').style.display = 'none';
        }

        function switchTeam(n) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.team-section').forEach(s => s.classList.remove('active'));
            
            if (n === 1) {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('team1Section').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('team2Section').classList.add('active');
            }
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', () => {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            
            const filtered1 = team1.filter(p => 
                p.name.toLowerCase().includes(term) || p.position.toLowerCase().includes(term)
            );
            const filtered2 = team2.filter(p => 
                p.name.toLowerCase().includes(term) || p.position.toLowerCase().includes(term)
            );
            
            renderTeam('team1Grid', filtered1);
            renderTeam('team2Grid', filtered2);
        });

        window.onload = () => {
            renderTeam('team1Grid', team1);
            renderTeam('team2Grid', team2);
        };
    </script>
</body>
</html>
